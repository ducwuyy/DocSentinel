name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: |
          # stop the build if there are Python syntax errors or undefined names
          ruff check . --output-format=github --select=E9,F63,F7,F82
          # default set of ruff rules with GitHub annotation format
          ruff check . --output-format=github

      - name: Run tests
        run: pytest --cov=app --cov-report=xml --cov-report=term

      # Optional: upload coverage to Codecov (enable if you use codecov.io)
      # - name: Upload coverage
      #   uses: codecov/codecov-action@v4
      #   if: matrix.python-version == '3.11'
      #   with:
      #     files: ./coverage.xml
